services:
  # ============================================
  # Infrastructure
  # ============================================

  postgres:
    image: postgres:16
    container_name: constell-postgres
    environment:
      POSTGRES_DB: constell
      POSTGRES_USER: constell
      POSTGRES_PASSWORD: constell_dev
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U constell -d constell"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: constell-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: constell-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: >
      --jetstream
      --store_dir /data
      --http_port 8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: constell-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend Services
  # ============================================

  auth-service:
    build:
      context: ../../
      dockerfile: backend/services/auth-service/Dockerfile
    container_name: constell-auth-service
    environment:
      PORT: "9081"
      DATABASE_URL: "postgres://constell:constell_dev@postgres:5432/constell?sslmode=disable"
      REDIS_URL: "redis:6379"
      JWT_SECRET: "dev-secret-change-me"
    ports:
      - "9081:9081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: ../../
      dockerfile: backend/services/user-service/Dockerfile
    container_name: constell-user-service
    environment:
      PORT: "9082"
      DATABASE_URL: "postgres://constell:constell_dev@postgres:5432/constell?sslmode=disable"
      REDIS_URL: "redis:6379"
      JWT_SECRET: "dev-secret-change-me"
    ports:
      - "9082:9082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  community-service:
    build:
      context: ../../
      dockerfile: backend/services/community-service/Dockerfile
    container_name: constell-community-service
    environment:
      PORT: "9083"
      DATABASE_URL: "postgres://constell:constell_dev@postgres:5432/constell?sslmode=disable"
      REDIS_URL: "redis:6379"
      JWT_SECRET: "dev-secret-change-me"
    ports:
      - "9083:9083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: ../../
      dockerfile: backend/services/api-gateway/Dockerfile
    container_name: constell-api-gateway
    environment:
      GATEWAY_ADDR: ":8080"
      AUTH_SERVICE_URL: "http://auth-service:9081"
      USER_SERVICE_URL: "http://user-service:9082"
      COMMUNITY_SERVICE_URL: "http://community-service:9083"
      JWT_SECRET: "dev-secret-change-me"
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - user-service
      - community-service

  # ============================================
  # WS Gateway (2 instances for fan-out testing)
  # ============================================

  ws-gateway-1:
    build:
      context: ../../
      dockerfile: backend/services/ws-gateway/Dockerfile
    container_name: constell-ws-gateway-1
    environment:
      LISTEN_ADDR: ":8081"
      REDIS_ADDR: "redis:6379"
      NATS_URL: "nats://nats:4222"
      USER_SERVICE_ADDR: "http://user-service:9082"
      COMMUNITY_SERVICE_ADDR: "http://community-service:9083"
      JWT_SECRET: "dev-secret-change-me"
      GATEWAY_ID: "ws-gateway-1"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ws-gateway-2:
    build:
      context: ../../
      dockerfile: backend/services/ws-gateway/Dockerfile
    container_name: constell-ws-gateway-2
    environment:
      LISTEN_ADDR: ":8081"
      REDIS_ADDR: "redis:6379"
      NATS_URL: "nats://nats:4222"
      USER_SERVICE_ADDR: "http://user-service:9082"
      COMMUNITY_SERVICE_ADDR: "http://community-service:9083"
      JWT_SECRET: "dev-secret-change-me"
      GATEWAY_ID: "ws-gateway-2"
    ports:
      - "8082:8081"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
