upstream ws_gateways {
    server ws-gateway-1:8081;
    server ws-gateway-2:8081;
}

server {
    listen 80;

    root /usr/share/nginx/html;

    # Content-hashed build assets: safe to cache forever (filename changes
    # whenever content does).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # REST API reverse proxy
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket reverse proxy
    location /ws {
        proxy_pass http://ws_gateways;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # SPA entry. Never cache index.html: it references the hashed asset bundle,
    # so a stale copy makes the browser keep loading an old (pre-fix) bundle
    # even after a deploy.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
