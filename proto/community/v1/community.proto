syntax = "proto3";

package community.v1;

option go_package = "github.com/constell/constell/backend/pkg/proto/communityv1";

import "common/v1/common.proto";

// CommunityService handles communities, channels, members, and group messages.
service CommunityService {
  // --- Community ---
  rpc CreateCommunity(CreateCommunityRequest) returns (CreateCommunityResponse);
  rpc GetCommunity(GetCommunityRequest) returns (GetCommunityResponse);
  rpc UpdateCommunity(UpdateCommunityRequest) returns (UpdateCommunityResponse);
  rpc DeleteCommunity(DeleteCommunityRequest) returns (DeleteCommunityResponse);
  rpc ListCommunities(ListCommunitiesRequest) returns (ListCommunitiesResponse);

  // --- Channel ---
  rpc CreateChannel(CreateChannelRequest) returns (CreateChannelResponse);
  rpc GetChannel(GetChannelRequest) returns (GetChannelResponse);
  rpc UpdateChannel(UpdateChannelRequest) returns (UpdateChannelResponse);
  rpc DeleteChannel(DeleteChannelRequest) returns (DeleteChannelResponse);
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);

  // --- Membership ---
  rpc JoinCommunity(JoinCommunityRequest) returns (JoinCommunityResponse);
  rpc LeaveCommunity(LeaveCommunityRequest) returns (LeaveCommunityResponse);
  rpc KickMember(KickMemberRequest) returns (KickMemberResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);

  // --- Channel Messages ---
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
}

// =============================================
// Community
// =============================================

message Community {
  string id = 1;
  string name = 2;
  string description = 3;
  string icon_url = 4;
  string owner_id = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

message CreateCommunityRequest {
  string name = 1;
  string description = 2;
  string icon_url = 3;
}

message CreateCommunityResponse {
  Community community = 1;
}

message GetCommunityRequest {
  string community_id = 1;
}

message GetCommunityResponse {
  Community community = 1;
}

message UpdateCommunityRequest {
  string community_id = 1;
  string name = 2;
  string description = 3;
  string icon_url = 4;
}

message UpdateCommunityResponse {
  Community community = 1;
}

message DeleteCommunityRequest {
  string community_id = 1;
}

message DeleteCommunityResponse {}

message ListCommunitiesRequest {
  common.v1.PaginationRequest pagination = 1;
}

message ListCommunitiesResponse {
  repeated Community communities = 1;
  common.v1.PaginationResponse pagination = 2;
}

// =============================================
// Channel
// =============================================

enum ChannelType {
  CHANNEL_TYPE_UNSPECIFIED = 0;
  CHANNEL_TYPE_TEXT = 1;
  CHANNEL_TYPE_ANNOUNCEMENT = 2;
}

message Channel {
  string id = 1;
  string community_id = 2;
  string name = 3;
  string topic = 4;
  ChannelType type = 5;
  int32 position = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message CreateChannelRequest {
  string community_id = 1;
  string name = 2;
  string topic = 3;
  ChannelType type = 4;
  int32 position = 5;
}

message CreateChannelResponse {
  Channel channel = 1;
}

message GetChannelRequest {
  string channel_id = 1;
}

message GetChannelResponse {
  Channel channel = 1;
}

message UpdateChannelRequest {
  string channel_id = 1;
  string name = 2;
  string topic = 3;
  ChannelType type = 4;
  int32 position = 5;
}

message UpdateChannelResponse {
  Channel channel = 1;
}

message DeleteChannelRequest {
  string channel_id = 1;
}

message DeleteChannelResponse {}

message ListChannelsRequest {
  string community_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListChannelsResponse {
  repeated Channel channels = 1;
  common.v1.PaginationResponse pagination = 2;
}

// =============================================
// Membership
// =============================================

message CommunityMember {
  string community_id = 1;
  string user_id = 2;
  string nickname = 3;
  repeated string role_ids = 4;
  int64 joined_at = 5;
}

message JoinCommunityRequest {
  string community_id = 1;
}

message JoinCommunityResponse {
  CommunityMember member = 1;
}

message LeaveCommunityRequest {
  string community_id = 1;
}

message LeaveCommunityResponse {}

message KickMemberRequest {
  string community_id = 1;
  string user_id = 2;  // target user to kick
}

message KickMemberResponse {}

message ListMembersRequest {
  string community_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListMembersResponse {
  repeated CommunityMember members = 1;
  common.v1.PaginationResponse pagination = 2;
}

// =============================================
// Channel Messages
// =============================================

message ChannelMessage {
  string id = 1;
  string channel_id = 2;
  string author_id = 3;
  string content = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
  repeated common.v1.Attachment attachments = 7;
}

message SendMessageRequest {
  string channel_id = 1;
  string content = 2;
  repeated string file_ids = 3;
}

message SendMessageResponse {
  ChannelMessage message = 1;
}

message GetMessagesRequest {
  string channel_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message GetMessagesResponse {
  repeated ChannelMessage messages = 1;
  common.v1.PaginationResponse pagination = 2;
}
